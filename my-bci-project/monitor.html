<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>脑机接口 - 10-20 电极监控 </title>
    <!-- 引入 Vue 2 框架 -->
    <script src="https://cdn.jsdelivr.net/npm/vue@2.7.14/dist/vue.js"></script>
    <!-- 引入 Chart.js 图表库 -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <!-- 
        引入 PapaParse CSV 解析库
        作用：在前端直接读取本地的 CSV 文件，把文本解析成 JavaScript 对象数组
        这样不需要后端服务器，浏览器自己就能打开 CSV 并逐行处理
    -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
    <!-- 引入 Font Awesome 图标库 -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        /* ========== 页面样式 ========== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #f5f5f5;
            color: #333;
            height: 100vh;
            padding: 8px;
            overflow: hidden;
        }
        .app-container {
            display: flex;
            flex-direction: column;   /* 上下排列：头部、中间、底部 */
            height: 100vh;
            background: transparent;
            border-radius: 16px;
            overflow: hidden;
        }
        /* 头部区域：设备ID + 三个按钮 */
        .header {
            background: #ffffff;
            padding: 10px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #eee;
            flex-shrink: 0;
            color: #333;
        }
        .device-info {
            font-size: 16px;
            font-weight: bold;
            color: #333;
        }
        .button-group button {
            margin-left: 10px;
            padding: 6px 14px;
            border: none;
            border-radius: 24px;
            font-size: 13px;
            cursor: pointer;
        }
        .btn-start { background: #27ae60; color: white; }
        .btn-stop { background: #e74c3c; color: white; }
        .btn-exit { background: #7f8c8d; color: white; }
        button:disabled { opacity: 0.5; cursor: not-allowed; }
        /* 中间主体：左右两栏 */
        .dashboard {
            display: flex;
            gap: 16px;
            padding: 12px;
            overflow: hidden;
            align-items: flex-start;
            flex: 0 0 auto;      /* 不自动拉伸，高度由下面决定 */
            height: 55vh;        /* 占屏幕高度的55%，让中间区域缩小 */
            min-height: 300px;
        }
        /* 左侧电极图面板 */
        .electrode-panel {
            flex: 0 0 38%;
            background: #ffffff;
            border-radius: 14px;
            padding: 10px;
            display: flex;
            flex-direction: column;
            height: 100%;
            overflow: hidden;
            color: #333;
        }
        .electrode-panel h3 {
            font-size: 14px;
            margin-bottom: 8px;
            display: flex;
            align-items: center;
            gap: 6px;
            flex-shrink: 0;
            color: #333;
        }
        .electrode-svg-container {
            flex: 1;             /* 占据剩余高度，让SVG自适应 */
            min-height: 0;
            width: 100%;
        }
        svg {
            width: 100%;
            height: 100%;
            background: #f4f6f9;
            border-radius: 12px;
        }
        .legend {
            display: flex;
            justify-content: center;
            gap: 16px;
            margin-top: 8px;
            font-size: 11px;
            flex-shrink: 0;
            color: #555;
        }
        .legend span {
            display: inline-flex;
            align-items: center;
            gap: 5px;
        }
        /* 右侧四个通道折线图面板 */
        .charts-panel {
            flex: 1;
            background: #ffffff;
            border-radius: 14px;
            padding: 10px;
            display: flex;
            flex-direction: column;
            gap: 8px;
            height: 100%;
            overflow: hidden;
        }
        .chart-card {
            background: #0a0f1a;
            border-radius: 10px;
            padding: 4px 8px;
            display: flex;
            flex-direction: column;
            flex: 1;             /* 四个卡片等分垂直高度 */
            min-height: 0;
            border: 1px solid #1a2a3a;
        }
        .chart-card h4 {
            font-size: 12px;
            margin-bottom: 4px;
            display: flex;
            align-items: center;
            gap: 6px;
            flex-shrink: 0;
            color: #00ff88;
        }
        .chart-card canvas {
            width: 100%;
            flex: 1;             /* canvas 填满卡片剩余空间 */
            min-height: 0;
        }
        /* 底部状态栏 */
        .status-bar {
            background: #ffffff;
            padding: 16px 24px;
            display: flex;
            justify-content: center;
            align-items: center;
            border-top: 1px solid #eee;
            flex-shrink: 0;
        }
        .status-value {
            font-size: 26px;
            font-weight: bold;
            padding: 10px 32px;
            border-radius: 60px;
            text-align: center;
        }
        /* 三种状态对应的背景色 */
        .放松 { background: #27ae60; color: white; }
        .集中 { background: #2980b9; color: white; }
        .中性 { background: #e67e22; color: white; }
        .data-status { display: none; }  /* 隐藏旧版本的状态标签 */
    </style>
</head>
<body>
<div id="app">
    <div class="app-container">
        <!-- 头部：显示设备ID和三个控制按钮 -->
        <div class="header">
            <div class="device-info"><i class="fas fa-microchip"></i> 设备ID：{{ deviceId }}</div>
            <div class="button-group">
                <button class="btn-start" @click="startAnalysis" :disabled="isRunning"><i class="fas fa-play"></i> 开始分析</button>
                <button class="btn-stop" @click="stopAnalysis" :disabled="!isRunning"><i class="fas fa-stop"></i> 结束分析</button>
                <button class="btn-exit" @click="exitDevice"><i class="fas fa-sign-out-alt"></i> 退出设备</button>
            </div>
        </div>
        <!-- 中间区域：左侧电极图 + 右侧四个折线图 -->
        <div class="dashboard">
            <!-- 左侧电极图 SVG 容器 -->
            <div class="electrode-panel">
                <h3><i class="fas fa-brain"></i> 国际 10-20 电极系统</h3>
                <div class="electrode-svg-container">
                    <svg viewBox="0 0 100 100" preserveAspectRatio="xMidYMid meet" id="electrodeSvg">
                        <!-- 头部轮廓椭圆，辅助视觉 -->
                        <ellipse cx="50" cy="50" rx="45" ry="45" fill="#f4f6f9" stroke="#ccc" stroke-width="0.5"/>
                        <!-- 上方标注 NASION，下方标注 INION -->
                        <text x="50" y="2" font-size="2.5" text-anchor="middle" fill="#333">NASION</text>
                        <text x="50" y="100" font-size="2.5" text-anchor="middle" fill="#333">INION</text>
                    </svg>
                </div>
                <!-- 图例说明 -->
                <div class="legend">
                    <span><i class="fas fa-circle" style="color:#f1c40f"></i> 相对电极</span>
                    <span><i class="fas fa-circle" style="color:#2ecc71"></i> 校准参考点 (NZ)</span>
                    <span><i class="fas fa-circle" style="color:#bdc3c7"></i> 其他电极</span>
                </div>
            </div>
            <!-- 右侧四个通道折线图 -->
            <div class="charts-panel">
                <div class="chart-card">
                    <h4><i class="fas fa-waveform" style="color:#e74c3c"></i> TP9</h4>
                    <canvas id="chart1"></canvas>
                </div>
                <div class="chart-card">
                    <h4><i class="fas fa-waveform" style="color:#3498db"></i> AF7</h4>
                    <canvas id="chart2"></canvas>
                </div>
                <div class="chart-card">
                    <h4><i class="fas fa-waveform" style="color:#2ecc71"></i> AF8</h4>
                    <canvas id="chart3"></canvas>
                </div>
                <div class="chart-card">
                    <h4><i class="fas fa-waveform" style="color:#f39c12"></i> TP10</h4>
                    <canvas id="chart4"></canvas>
                </div>
            </div>
        </div>
        <!-- 底部状态栏，显示当前放松/集中/中性状态 -->
        <div class="status-bar">
            <div class="status-value" :class="statusClass">{{ statusText }}</div>
        </div>
    </div>
</div>

<script>
    // ========== 后端服务器配置 ==========
    const API_BASE = 'http://60.205.161.199:8000';

    // 1. 电极位置数据定义 (基于国际10-20系统，11条纬线)
    // 每条纬线的 Y 坐标 (从上到下，范围 0-100)
    const yPos = {
        line1: 5,   // NZ
        line2: 12,  // FP1, FPz, FP2
        line3: 20,  // AF7, AF3, AFz, AF4, AF8
        line4: 28,  // F9, F7, F5, F3, F1, Fz, F2, F4, F6, F8, F10
        line5: 36,  // FT9, FT7, FC5, FC3, FC1, FCz, FC2, FC4, FC6, FC8, FC10
        line6: 46,  // A1, T9, T7, C5, C3, C1, Cz, C2, C4, C6, T8, T10, A2
        line7: 56,  // TP9, TP7, CP5, CP3, CP1, CPz, CP2, CP4, CP6, CP8, TP10
        line8: 66,  // P9, P7, P5, P3, P1, Pz, P2, P4, P6, P8, P10
        line9: 76,  // PO7, PO3, POz, PO4, PO8
        line10: 86, // O1, Oz, O2
        line11: 95  // IZ
    };

    // 每条纬线上的电极名称 (从左到右排列)
    const electrodesByLine = {
        line1:  ["NZ"],
        line2:  ["FP1", "FPz", "FP2"],
        line3:  ["AF7", "AF3", "AFz", "AF4", "AF8"],
        line4:  ["F9", "F7", "F5", "F3", "F1", "Fz", "F2", "F4", "F6", "F8", "F10"],
        line5:  ["FT9", "FT7", "FC5", "FC3", "FC1", "FCz", "FC2", "FC4", "FC6", "FC8", "FC10"],
        line6:  ["A1", "T9", "T7", "C5", "C3", "C1", "Cz", "C2", "C4", "C6", "T8", "T10", "A2"],
        line7:  ["TP9", "TP7", "CP5", "CP3", "CP1", "CPz", "CP2", "CP4", "CP6", "CP8", "TP10"],
        line8:  ["P9", "P7", "P5", "P3", "P1", "Pz", "P2", "P4", "P6", "P8", "P10"],
        line9:  ["PO7", "PO3", "POz", "PO4", "PO8"],
        line10: ["O1", "Oz", "O2"],
        line11: ["IZ"]
    };

    /**
     * 根据给定的 Y 坐标和该行电极个数，计算每个电极的 X 坐标 (左右对称)
     * @param {number} n - 该行电极个数
     * @param {number} y - Y 坐标 (0-100)
     * @returns {number[]} 长度为 n 的 X 坐标数组
     */
    function getXPositions(n, y) {
        if (n === 1) return [50];  // 只有1个电极时居中
        // 相对于椭圆中心 (50,50)，横向半径 45，纵向半径 45
        const dy = (y - 50) / 45;
        // 最大偏移量，Y 越靠近顶部或底部，偏移越小，符合椭圆形状
        let maxOffset = 42 * Math.sqrt(1 - dy * dy);
        if (maxOffset < 8) maxOffset = 8;   // 防止过于拥挤
        const step = (2 * maxOffset) / (n - 1);
        const startX = 50 - maxOffset;
        return Array.from({ length: n }, (_, i) => startX + i * step);
    }

    /**
     * 生成所有电极的 {name, x, y} 数组
     */
    function generateElectrodes() {
        let electrodes = [];
        for (let i = 1; i <= 11; i++) {
            const lineKey = `line${i}`;
            const y = yPos[lineKey];
            const names = electrodesByLine[lineKey];
            const xs = getXPositions(names.length, y);
            for (let j = 0; j < names.length; j++) {
                electrodes.push({ name: names[j], x: xs[j], y: y });
            }
        }
        return electrodes;
    }

    // Vue 应用实例 
    new Vue({
        el: '#app',            // 挂载到 id="app" 的元素
        data: {
            // 从 localStorage 读取设备信息
            deviceId: localStorage.getItem('deviceId') || 'BCI-001',
            expId: localStorage.getItem('expId') || 'exp_001',
            isRunning: false,      // 是否正在分析数据
            statusText: '等待开始', // 底部显示的状态文字
            statusClass: '',       // 状态对应的 CSS 类名 (放松/集中/中性)
            // 四个通道的数据数组
            dataTP9: [],
            dataAF7: [],
            dataAF8: [],
            dataTP10: [],
            // Chart.js 图表实例
            chart1: null,
            chart2: null,
            chart3: null,
            chart4: null,
            // ========== 定时器相关 ==========
            originTimer: null,     // get_origin_data 定时器 (每 7ms)
            labelTimer: null,      // get_label 定时器 (每 1000ms)
            startDelayTimer: null, // 3秒延迟启动定时器
            heartbeatTimer: null,  // 心跳更新定时器
            startTime: null,       // 记录开始时间
            // ========== CSV 本地模拟数据（备用，后端不可用时可切换） ==========
            csvData: [],
            csvIndex: 0,
            worker: null
        },
        // Vue 生命周期钉子: 组件挂载后执行 (此时 DOM 已存在)
        mounted() {
            this.drawElectrodes();   // 绘制左侧电极图
            this.initCharts();       // 初始化右侧四个折线图
            this.startHeartbeat();   // 启动心跳，防止关页 5 秒后未回来则 stop_receive
        },
        // 组件销毁前清理，防止内存泄漏
        beforeDestroy() {
            this.clearAllTimers();
        },
        methods: {
            /**
             * 绘制所有电极 (圆点 + 文字) 到 SVG 中
             */
            drawElectrodes() {
                const svg = document.getElementById('electrodeSvg');
                const electrodes = generateElectrodes();
                // 定义需要特殊高亮的电极 (Muse传感器和参考点)
                const yellowElectrodes = ["AF7", "AF8", "TP9", "TP10"];
                const greenElectrodes = ["NZ"];
                // 初始颜色
                const getInitialColor = (name) => "#bdc3c7";

                electrodes.forEach(e => {
                    // 创建圆点
                    const circle = document.createElementNS("http://www.w3.org/2000/svg", "circle");
                    circle.setAttribute("cx", e.x);
                    circle.setAttribute("cy", e.y);
                    circle.setAttribute("r", "1.8");          // 半径大小
                    circle.setAttribute("data-name", e.name); // 存储电极名，便于以后高亮
                    circle.style.fill = getInitialColor(e.name);
                    circle.style.stroke = "#7f8c8d";
                    circle.style.strokeWidth = "0.3";
                    circle.style.cursor = "pointer";
                    // 点击时在控制台输出电极名称和坐标，方便调试
                    circle.addEventListener("click", () => console.log(`点击电极: ${e.name} (${e.x.toFixed(1)}, ${e.y.toFixed(1)})`));
                    svg.appendChild(circle);

                    // 创建文字标签
                    const text = document.createElementNS("http://www.w3.org/2000/svg", "text");
                    text.setAttribute("x", e.x);
                    text.setAttribute("y", e.y - 2.2);      // 文字比圆点稍高，避免重叠
                    text.setAttribute("font-size", "2.1");
                    text.setAttribute("text-anchor", "middle");
                    text.setAttribute("fill", "#333");
                    text.textContent = e.name;
                    svg.appendChild(text);
                });

                // 保存一个更新电极颜色的函数，供 start/stop 调用
                // isActive = true 时点亮黄/绿电极，false 时全部变灰
                this.updateElectrodeColors = (isActive) => {
                    const circles = document.querySelectorAll('#electrodeSvg circle');
                    circles.forEach(circle => {
                        const name = circle.getAttribute('data-name');
                        if (isActive) {
                            if (yellowElectrodes.includes(name)) circle.style.fill = "#f1c40f";   // 黄色
                            else if (greenElectrodes.includes(name)) circle.style.fill = "#2ecc71"; // 绿色
                            else circle.style.fill = "#bdc3c7";   // 灰色
                        } else {
                            circle.style.fill = "#bdc3c7";
                        }
                    });
                };
            },

            /**
             * 初始化四个折线图 (Chart.js)
             */
            initCharts() {
                const chartConfig = {
                    type: 'line',
                    // tension: 0 表示折线是直的，没有弧度
                    data: { labels: [], datasets: [{ data: [], borderWidth: 1.5, fill: false, tension: 0, pointRadius: 0 }] },
                    options: {
                        responsive: true,
                        maintainAspectRatio: false,
                        animation: false,
                        plugins: { legend: { display: false }, tooltip: { enabled: false } },
                        scales: {
                            x: {
                                display: true,
                                ticks: { display: false },
                                grid: { color: '#1a2a3a', lineWidth: 0.8 }  // 深色网格线
                            },
                            y: {
                                display: true,
                                ticks: { display: false, maxTicksLimit: 4 },
                                grid: { color: '#1a2a3a', lineWidth: 0.8 }   // 深色网格线
                            }
                        }
                    }
                };
                const ecgColor = '#00ff88';
                this.chart1 = new Chart(document.getElementById('chart1'), {
                    ...chartConfig,
                    data: { labels: [], datasets: [{ ...chartConfig.data.datasets[0], borderColor: ecgColor }] }
                });
                this.chart2 = new Chart(document.getElementById('chart2'), {
                    ...chartConfig,
                    data: { labels: [], datasets: [{ ...chartConfig.data.datasets[0], borderColor: ecgColor }] }
                });
                this.chart3 = new Chart(document.getElementById('chart3'), {
                    ...chartConfig,
                    data: { labels: [], datasets: [{ ...chartConfig.data.datasets[0], borderColor: ecgColor }] }
                });
                this.chart4 = new Chart(document.getElementById('chart4'), {
                    ...chartConfig,
                    data: { labels: [], datasets: [{ ...chartConfig.data.datasets[0], borderColor: ecgColor }] }
                });
            },

            /**
             * 更新所有图表 (根据当前 dataTP9 等数组重新渲染)
             */
            updateAllCharts() {
                const update = (chart, data) => {
                    chart.data.labels = data.map((_, i) => i);   // X轴标签为 0,1,2,...
                    chart.data.datasets[0].data = [...data];
                    chart.update('none');            // 无动画更新
                };
                update(this.chart1, this.dataTP9);
                update(this.chart2, this.dataAF7);
                update(this.chart3, this.dataAF8);
                update(this.chart4, this.dataTP10);
            },

            /**
             * 添加一个数据点到四个通道的数组中，并更新图表和状态
             */
            addDataPoint(tp9, af7, af8, tp10, label) {
                this.dataTP9.push(tp9);
                this.dataAF7.push(af7);
                this.dataAF8.push(af8);
                this.dataTP10.push(tp10);
                // 保留最近120个点，减轻图表更新负担
                if (this.dataTP9.length > 120) this.dataTP9.shift();
                if (this.dataAF7.length > 120) this.dataAF7.shift();
                if (this.dataAF8.length > 120) this.dataAF8.shift();
                if (this.dataTP10.length > 120) this.dataTP10.shift();
                this.updateAllCharts();
                this.setStatusByLabel(label);
            },

            /**
             * 根据 CSV 的 label 列直接显示真实状态
             * 0=集中, 1=中性, 2=放松
             */
            setStatusByLabel(label) {
                if (label === 0) {
                    this.statusText = '集中';
                    this.statusClass = '集中';
                } else if (label === 1) {
                    this.statusText = '中性';
                    this.statusClass = '中性';
                } else {
                    this.statusText = '放松';
                    this.statusClass = '放松';
                }
            },

            /**
             * 获取原始脑电数据 —— 串行链式循环，每次间隔至少 7ms
             *
             * 逻辑：记录开始时间 → 发请求 → 等响应 → 更新图表
             *       → 计算剩余时间 → 等满 7ms 后再发下一次
             * 此方式满足 7ms 间隔要求，且永远只有 1 个请求在飞。
             */
            async originDataLoop() {
                if (!this.isRunning) return;
                const startTime = Date.now();
                try {
                    const resp = await fetch(`${API_BASE}/bci/get_origin_data/?exp_id=${this.expId}`);
                    const json = await resp.json();
                    if (json.code === 0 && json.data) {
                        const ch = json.data.channels;
                        this.dataTP9.push(parseFloat(ch.TP9 || ch.ch1 || 0));
                        this.dataAF7.push(parseFloat(ch.AF7 || ch.ch2 || 0));
                        this.dataAF8.push(parseFloat(ch.AF8 || ch.ch3 || 0));
                        this.dataTP10.push(parseFloat(ch.TP10 || ch.ch4 || 0));
                        if (this.dataTP9.length > 120) this.dataTP9.shift();
                        if (this.dataAF7.length > 120) this.dataAF7.shift();
                        if (this.dataAF8.length > 120) this.dataAF8.shift();
                        if (this.dataTP10.length > 120) this.dataTP10.shift();
                        this.updateAllCharts();
                    }
                } catch (e) {
                    // 网络错误不中断，继续下一次
                }
                if (!this.isRunning) return;
                // 计算本次已耗时，剩余时间至少等到 7ms 才发下一次
                const elapsed = Date.now() - startTime;
                const delay = Math.max(0, 7 - elapsed);
                setTimeout(() => this.originDataLoop(), delay);
            },

            /**
             * 获取情绪分类标签（调用后端）
             * GET /bci/get_label/?exp_id=xxx
             */
            async fetchLabel() {
                try {
                    const resp = await fetch(`${API_BASE}/bci/get_label/?exp_id=${this.expId}`);
                    const json = await resp.json();
                    if (json.code === 0 && json.data) {
                        this.setStatusByLabel(json.data.label);
                    }
                } catch (e) {
                    // 网络错误不中断，静默处理
                }
            },

            /**
             * 调用 stop_receive 接口
             */
            async callStopReceive() {
                try {
                    await fetch(`${API_BASE}/bci/stop_receive/`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ exp_id: this.expId })
                    });
                } catch (e) {
                    console.warn('stop_receive 请求失败:', e);
                }
            },

            /**
             * 心跳机制
             *
             * 原理：
             * - 每 2 秒将当前时间戳写入 localStorage.heartbeat
             * - 页面关闭时（beforeunload），心跳停止。
             *   如果 5 秒内未重新打开，就触发 stop_receive。
             * - 页面关闭时同时用 sendBeacon 尝试直接发 stop_receive
             *   （sendBeacon 不收异步阻塞，最可靠）
             * - 重新打开时检查：如果时间差 < 5 秒，说明是刷新，不再发 stop
             */
            startHeartbeat() {
                const expId = this.expId;
                const stopUrl = `${API_BASE}/bci/stop_receive/`;
                const stopBody = JSON.stringify({ exp_id: expId });

                // 页面加载时检查：如果上次关页距现在 > 5 秒，就发 stop_receive
                const lastBeat = parseInt(localStorage.getItem('heartbeat') || '0');
                if (lastBeat > 0 && (Date.now() - lastBeat) > 5000) {
                    console.log('[heartbeat] 关页超过 5 秒，重新连接时发送 stop_receive');
                    this.callStopReceive();
                }

                // 每 2 秒更新心跳
                localStorage.setItem('heartbeat', Date.now().toString());
                this.heartbeatTimer = setInterval(() => {
                    localStorage.setItem('heartbeat', Date.now().toString());
                }, 2000);

                // 页面关闭时：尝试用 sendBeacon 发送 stop_receive
                // sendBeacon 在浏览器关闭时仍能可靠发送，不会被 terminate
                window.addEventListener('beforeunload', () => {
                    // 更新心跳时间（下次加载时用于判断是否超时）
                    localStorage.setItem('heartbeat', Date.now().toString());
                    // 用 sendBeacon 在页面关闭时发送 stop_receive
                    const blob = new Blob([stopBody], { type: 'application/json' });
                    navigator.sendBeacon(stopUrl, blob);
                });
            },

            /**
             * 清除所有定时器
             */
            clearAllTimers() {
                if (this.originTimer) { clearInterval(this.originTimer); this.originTimer = null; }
                if (this.labelTimer)  { clearInterval(this.labelTimer);  this.labelTimer  = null; }
                if (this.startDelayTimer) { clearTimeout(this.startDelayTimer); this.startDelayTimer = null; }
                if (this.heartbeatTimer)  { clearInterval(this.heartbeatTimer); this.heartbeatTimer  = null; }
                this.stopWorker();
            },

            /**
             * 获取数据 —— 核心循环逻辑：从 CSV 中逐行读取真实数据
             */
            async fetchData() {
                const row = this.csvData[this.csvIndex];
                this.csvIndex = (this.csvIndex + 1) % this.csvData.length;
                return {
                    tp9: parseFloat(row.TP9),
                    af7: parseFloat(row.AF7),
                    af8: parseFloat(row.AF8),
                    tp10: parseFloat(row.TP10),
                    label: parseInt(row.label, 10)
                };
            },

            /**
             * 数据更新循环 —— Worker tick 触发（CSV 备用模式）
             */
            async updateDataLoop() {
                if (!this.isRunning || this.csvData.length === 0) return;
                const data = await this.fetchData();
                this.addDataPoint(data.tp9, data.af7, data.af8, data.tp10, data.label);
            },

            /**
             * 开始分析 —— 点击"开始分析"按钮后执行
             *
             * 流程：
             * 1. 清空四个通道的旧数据
             * 2. 点亮左侧电极图
             * 3. 延迟 3 秒后启动：
             *    - originDataLoop：串行链式循环，收到响应+渲染后再发下一次
             *    - get_label 每 1000ms 调用一次
             */
            startAnalysis() {
                if (this.isRunning) return;
                this.dataTP9 = [];
                this.dataAF7 = [];
                this.dataAF8 = [];
                this.dataTP10 = [];
                this.updateAllCharts();
                this.updateElectrodeColors(true);
                this.isRunning = true;
                this.startTime = Date.now();
                this.statusText = '准备中，3 秒后开始分析...';
                this.statusClass = '';

                // 延迟 3 秒后启动
                this.startDelayTimer = setTimeout(() => {
                    if (!this.isRunning) return;
                    this.statusText = '分析中...';

                    // 启动串行链式循环：收到响应+渲染完再发下一次
                    this.originDataLoop();

                    // 定时器：每 1000ms 获取一次分类标签
                    this.labelTimer = setInterval(() => {
                        this.fetchLabel();
                    }, 1000);

                    console.log('[BCI] 开始分析，expId:', this.expId);
                }, 3000);
            },

            /**
             * 结束分析：停止循环、电极变灰、更新状态
             */
            stopAnalysis() {
                if (!this.isRunning) return;
                this.isRunning = false;  // originDataLoop 检查此标志自动停止
                if (this.labelTimer)  { clearInterval(this.labelTimer);  this.labelTimer  = null; }
                if (this.startDelayTimer) { clearTimeout(this.startDelayTimer); this.startDelayTimer = null; }
                this.updateElectrodeColors(false);
                this.statusText = '已停止';
                this.statusClass = '';
            },

            /**
             * 启动 Web Worker（CSV 备用模式）
             */
            startWorker() {
                if (!this.worker) {
                    this.worker = new Worker('worker.js');
                    this.worker.onmessage = (e) => {
                        if (e.data.type === 'tick' && this.isRunning) {
                            this.updateDataLoop();
                        }
                    };
                }
                this.worker.postMessage({ action: 'start', interval: 20 });
            },

            /**
             * 停止 Web Worker
             */
            stopWorker() {
                if (this.worker) {
                    this.worker.postMessage({ action: 'stop' });
                }
            },

            /**
             * 退出设备：停止分析 → 调用 stop_receive → 跳回连接页
             */
            async exitDevice() {
                this.stopAnalysis();
                await this.callStopReceive();
                localStorage.removeItem('heartbeat');
                window.location.href = 'index.html';
            }
        }
    });
    // 暴露到全局，方便调试
    window.bciApp = document.getElementById('app').__vue__;
</script>
