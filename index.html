<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>脑机接口设备连接</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .container {
            background: white;
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            width: 400px;
            text-align: center;
        }
        h1 {
            color: #333;
            margin-bottom: 30px;
            font-size: 28px;
        }
        .input-group {
            margin-bottom: 30px;
            text-align: left;
        }
        label {
            display: block;
            margin-bottom: 10px;
            color: #555;
            font-size: 16px;
            font-weight: 500;
        }
        input {
            width: 100%;
            padding: 12px 15px;
            border: 2px solid #ddd;
            border-radius: 10px;
            font-size: 16px;
            transition: all 0.3s;
        }
        input:focus {
            outline: none;
            border-color: #667eea;
        }
        button {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 12px 30px;
            border-radius: 10px;
            font-size: 16px;
            cursor: pointer;
            transition: transform 0.2s;
            width: 100%;
        }
        button:hover {
            transform: translateY(-2px);
        }
        .error-msg {
            color: #e74c3c;
            margin-top: 15px;
            font-size: 14px;
            display: none;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1><i class="fa-solid fa-brain"></i> 脑机接口设备连接</h1>
        <div class="input-group">
            <label>设备ID：</label>
            <input type="text" id="deviceId" placeholder="请输入设备ID" value="BCI-001">
        </div>
        <button onclick="connectDevice()">连接设备</button>
        <div id="errorMsg" class="error-msg"></div>
    </div>

    <script>
        // ========== 后端服务器配置 ==========
        const API_BASE = 'http://60.205.161.199:8000';

        async function connectDevice() {
            const deviceId = document.getElementById('deviceId').value.trim();
            const errorMsg = document.getElementById('errorMsg');
            const btn = document.querySelector('button');

            // 不能为空
            if (!deviceId) {
                errorMsg.textContent = '请输入设备ID';
                errorMsg.style.display = 'block';
                return;
            }

            // 调用后端 start_receive 接口，直接用用户输入的 deviceId 作为 exp_id
            errorMsg.style.display = 'none';
            btn.disabled = true;
            btn.textContent = '连接中...';

            try {
                const resp = await fetch(`${API_BASE}/bci/start_receive/`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ exp_id: deviceId })
                });
                const json = await resp.json();
                if (json.code === 0) {
                    // 启动成功，保存设备信息并跳转监控页
                    localStorage.setItem('deviceId', deviceId);
                    localStorage.setItem('expId', deviceId);  // exp_id 与输入的 deviceId 相同
                    localStorage.setItem('heartbeat', Date.now().toString());
                    window.location.href = 'monitor.html';
                } else {
                    errorMsg.textContent = '启动失败：' + json.msg;
                    errorMsg.style.display = 'block';
                    btn.disabled = false;
                    btn.textContent = '连接设备';
                }
            } catch (e) {
                errorMsg.textContent = '网络错误，请检查服务器连接';
                errorMsg.style.display = 'block';
                btn.disabled = false;
                btn.textContent = '连接设备';
            }
        }
    </script>
</body>
</html>
